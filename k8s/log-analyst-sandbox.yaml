apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: kubernetes-agent-logs
  namespace: argo-rollouts
spec:
  podTemplate:
    metadata:
      labels:
        app: kubernetes-agent-logs
    spec:
      runtimeClassName: gvisor
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      tolerations:
      - key: "sandbox.gke.io/runtime"
        value: "gvisor"
        effect: "NoSchedule"
      containers:
        - name: agent
          image: kubernetes-agents-antigravity:latest
          imagePullPolicy: Always
          args: ["--role", "logs"]
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: argo-rollouts-secret
                  key: GEMINI_API_KEY
          ports:
            - containerPort: 8080
          securityContext:
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: "500m"
              memory: "1Gi"
            requests:
              cpu: "250m"
              memory: "512Mi"
